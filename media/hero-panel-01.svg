<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 760" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#030503"/>
      <stop offset="0.46" stop-color="#0b120d"/>
      <stop offset="1" stop-color="#182316"/>
    </linearGradient>
    <filter id="fog">
      <feTurbulence baseFrequency="0.012 0.05" numOctaves="2" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1800" height="760" fill="url(#sky)"/>
  <rect width="1800" height="760" filter="url(#fog)" opacity="0.7"/>
  <g shape-rendering="crispEdges">
